name: Publish to npm

# Triggers when package.json is updated on main (i.e. after a version-bump PR merges).
# Reads the version, skips if the tag already exists, then lints/builds/publishes
# to npm and creates the corresponding git tag — all in one job, no PAT required.

on:
  push:
    branches:
      - main
    paths:
      - package.json

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # needed to push the release tag
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if release tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.pkg.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.pkg.outputs.version }} already exists — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.pkg.outputs.version }} not found — will publish."
          fi

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: npm install --no-audit --no-fund

      - name: Lint
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run lint

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is missing. Add NPM_TOKEN in GitHub repository settings (Secrets and variables > Actions > Secrets)."
            exit 1
          fi
          echo "Publishing v${{ steps.pkg.outputs.version }} with NPM_TOKEN secret"
          npm publish --access public

      - name: Create and push release tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"
